# ── Server ──────────────────────────────────────────
server.port=9000

# ── Database (MySQL) ───────────────────────────────────
spring.datasource.url=jdbc:mysql://localhost:3306/skyres_db?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# ── JWT ───────────────────────────────────────────────
jwt.secret=6+6E4iwgMWQA8GjEh3A9EBqxCCKyWwyHo9jejQKOKpE=
jwt.expiration-ms=86400000

# ── Mail ─────────────────────────────────────────────
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=your_email@gmail.com
spring.mail.password=your_app_password_here
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true

# ── File Upload ───────────────────────────────────────
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

# ── Swagger UI ────────────────────────────────────────
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.api-docs.path=/api-docs

# ── Groq (activity AI fill — never commit keys) ──
# Set env GROQ_API_KEY, OR copy groq.properties.example → .groq.properties in the back/ folder (gitignored).
groq.api.key=${GROQ_API_KEY:}
groq.model=llama-3.3-70b-versatile
spring.config.import=optional:file:.groq.properties,optional:file:.stripe.properties

# ── Stripe Checkout ──
# Do not set stripe.secret.key here: anything after spring.config.import overrides optional files.
# Use OS env STRIPE_SECRET_KEY (Spring maps it to stripe.secret.key) and/or keys in back/.stripe.properties.
# Used for Checkout success/cancel redirects (your Vite dev server)
skyres.app.public-url=${SKYRES_APP_PUBLIC_URL:http://localhost:5173}

# Comma-separated emails promoted to ADMIN on startup (optional env SKYRES_ADMIN_EMAILS)
skyres.admin.bootstrap-emails=${SKYRES_ADMIN_EMAILS:yassinenemri@gmail.com}
